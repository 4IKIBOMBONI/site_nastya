<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Интерактивный музей СВКИ</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="loader" id="loader"><img src="images/emblem.png" alt="Загрузка..."></div>
<div class="subpage-loader" id="subpageLoader"><img src="images/emblem.png" alt="Загрузка..."></div>

<div class="main-page" id="mainPage">
  <div class="decor-top-left">
    <img src="images/zhukov.png" alt="Орден Жукова" class="order-zhukov">
    <img src="images/red_banner.png" alt="Орден Красного Знамени" class="order-red-banner">
  </div>
  <div class="decor-top-right">
    <img src="images/dzerzhinsky.png" alt="Знак Дзержинского" class="dzerzhinsky">
  </div>
  <div class="title">Саратовский военный ордена Жукова краснознаменный<br>институт войск национальной гвардии<br>Российской Федерации</div>
  <div class="content" id="mainContent">
    <!-- Plates will be rendered dynamically from API -->
  </div>
</div>

<!-- Dynamic overlay containers -->
<div id="overlayContainer"></div>

<!-- Photo zoom modal -->
<div class="zoom-overlay" id="zoomOverlay" onclick="closeZoom()">
  <img id="zoomImg" src="" alt="">
  <button class="zoom-close" onclick="closeZoom()">✕</button>
</div>

<script src="app.js"></script>
</body>
</html>
