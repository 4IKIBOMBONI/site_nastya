<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Админ-панель — Музей СВКИ</title>
<link rel="stylesheet" href="admin.css">
</head>
<body>

<div id="loginScreen" class="login-screen">
  <div class="login-box">
    <h1>Админ-панель музея СВКИ</h1>
    <input type="password" id="loginPass" placeholder="Пароль" onkeydown="if(event.key==='Enter')doLogin()">
    <button onclick="doLogin()">Войти</button>
    <div id="loginError" class="error"></div>
  </div>
</div>

<div id="adminApp" class="admin-app" style="display:none">
  <header>
    <h1>Админ-панель музея СВКИ</h1>
    <div class="header-actions">
      <a href="/" target="_blank" class="btn btn-sm">Открыть сайт</a>
      <button onclick="doLogout()" class="btn btn-sm btn-danger">Выйти</button>
    </div>
  </header>

  <div class="admin-layout">
    <nav class="sidebar" id="sidebar"></nav>
    <main class="main-content" id="mainContent">
      <div class="welcome">
        <h2>Добро пожаловать в админ-панель</h2>
        <p>Выберите раздел слева или создайте новый.</p>
      </div>
    </main>
  </div>
</div>

<!-- Modal for editing -->
<div class="modal-overlay" id="modalOverlay" onclick="if(event.target===this)closeModal()">
  <div class="modal" id="modalContent"></div>
</div>

<script src="admin.js"></script>
</body>
</html>
